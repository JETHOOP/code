<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="main mt-5 p-5 w-50 m-auto">
        <div class="text-center"><h1>Registration form</h1></div>
        <form action=" ">
          <div class="row mt-5">
            <div class="col-12 form-floating mb-3">
              <input
                type="text"
                class="form-control "
                id="registerUsername"
                placeholder="name@example.com"
              />
              <label for="floatingInput">Username</label>
              <div id="registerUsernameErr"></div>
            </div>

            <div class="col-12 form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="registerEmail"
                placeholder="name@example.com"
              />
              <label for="floatingInput">Email address</label>
              <div id="registerEmailErr"></div>
            </div>

            <div class="col-12 form-floating">
              <input
                type="password"
                class="form-control"
                id="registerPassword"
                placeholder="Password"
              />
              <label for="floatingPassword">Password</label>
              <div id="registerPasswordErr"></div>
            </div>
            <div class="text-center">
              <button class="btn btn-primary mt-5 col-3" id="submitBtn">
                Register
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
